name: OpenIPTV
options:
  minimumXcodeGenVersion: 2.38.0
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
schemes:
  OpenIPTV:
    build:
      targets:
        OpenIPTV: all
        OpenIPTVTests: [test]
    run:
      config: Debug
      debugEnabled: false
    test:
      config: Debug
      targets:
        - OpenIPTVTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  OpenIPTV:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenIPTV
    info:
      path: OpenIPTV/Info.plist
      properties:
        CFBundleDisplayName: Open IPTV
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsArbitraryLoadsForMedia: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaelinal.openiptv
        PRODUCT_NAME: OpenIPTV
        DEVELOPMENT_TEAM: V9AX39SPJD
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  OpenIPTVTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenIPTVTests
    dependencies:
      - target: OpenIPTV
    info:
      path: OpenIPTVTests/Info.plist
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaelinal.openiptv.tests
        PRODUCT_NAME: OpenIPTVTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenIPTV.app/OpenIPTV"
        BUNDLE_LOADER: "$(TEST_HOST)"
